<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GA Web Launcher</title>
  <link rel="stylesheet" href="https://unpkg.com/element-plus@2.9.1/dist/index.css">
  <script src="https://unpkg.com/vue@3.5.13/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus@2.9.1/dist/index.full.min.js"></script>
  <script src="https://unpkg.com/@element-plus/icons-vue@2.3.1/dist/index.iife.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }
    #app { height: 100vh; display: flex; flex-direction: column; }
    .header { background: #2c3e50; color: white; padding: 12px 24px; display: flex; align-items: center; gap: 16px; }
    .header h1 { font-size: 18px; }
    .main { flex: 1; display: flex; overflow: hidden; }
    .sidebar { width: 240px; background: white; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; }
    .sidebar-header { padding: 12px 16px; border-bottom: 1px solid #e0e0e0; }
    .session-list { flex: 1; overflow-y: auto; }
    .session-item { padding: 10px 16px; cursor: pointer; border-bottom: 1px solid #f5f5f5; font-size: 14px; }
    .session-item:hover, .session-item.active { background: #ecf5ff; color: #409eff; }
    .chat-area { flex: 1; display: flex; flex-direction: column; background: #f5f5f5; }
    .messages { flex: 1; overflow-y: auto; padding: 16px; }
    .message { margin-bottom: 16px; display: flex; gap: 10px; }
    .message.user { flex-direction: row-reverse; }
    .message-avatar { width: 36px; height: 36px; border-radius: 50%; background: #409eff; color: white; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .message.user .message-avatar { background: #67c23a; }
    .message-bubble { max-width: 70%; padding: 10px 14px; border-radius: 8px; background: white; font-size: 14px; line-height: 1.5; }
    .message.user .message-bubble { background: #409eff; color: white; }
    .input-area { padding: 12px 16px; background: white; border-top: 1px solid #e0e0e0; display: flex; gap: 10px; }
    .input-area .el-input { flex: 1; }
    .status-bar { background: #2c3e50; color: #aaa; padding: 4px 16px; font-size: 12px; display: flex; gap: 20px; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>🤖 GA Web Launcher</h1>
    <span style="font-size:13px;opacity:0.7">v0.1.0</span>
  </div>
  <div class="main">
    <div class="sidebar">
      <div class="sidebar-header">
        <el-button type="primary" size="small" style="width:100%" @click="newSession">+ 新建会话</el-button>
      </div>
      <div class="session-list">
        <div v-for="s in sessions" :key="s.id" class="session-item" :class="{active: s.id===currentSessionId}" @click="switchSession(s.id)">
          {{ s.name }}
        </div>
      </div>
    </div>
    <div class="chat-area">
      <div class="messages" ref="messagesEl">
        <div v-for="msg in messages" :key="msg.id" class="message" :class="msg.role">
          <div class="message-avatar">{{ msg.role === 'user' ? 'U' : 'A' }}</div>
          <div class="message-bubble">{{ msg.content }}</div>
        </div>
      </div>
      <div class="input-area">
        <el-input v-model="inputText" placeholder="输入消息..." @keyup.enter="sendMessage" :disabled="!connected"></el-input>
        <el-button type="primary" @click="sendMessage" :disabled="!connected">发送</el-button>
      </div>
    </div>
  </div>
  <div class="status-bar">
    <span>状态: {{ connected ? '🟢 已连接' : '🔴 未连接' }}</span>
    <span>会话: {{ currentSessionId }}</span>
    <span>消息: {{ messages.length }}</span>
  </div>
</div>

<script>
const { createApp, ref, nextTick, onMounted } = Vue;

const app = createApp({
  setup() {
    const sessions = ref([{ id: 'default', name: '默认会话' }]);
    const currentSessionId = ref('default');
    const messages = ref([]);
    const inputText = ref('');
    const connected = ref(false);
    const messagesEl = ref(null);
    let ws = null;
    let msgId = 0;

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/ws/chat`);
      ws.onopen = () => {
        connected.value = true;
        ws.send(JSON.stringify({ type: 'init', session_id: currentSessionId.value }));
      };
      ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === 'response') {
          messages.value.push({ id: ++msgId, role: 'assistant', content: data.message });
          scrollToBottom();
        }
      };
      ws.onclose = () => { connected.value = false; setTimeout(connect, 3000); };
      ws.onerror = () => ws.close();
    }

    function sendMessage() {
      if (!inputText.value.trim() || !connected.value) return;
      messages.value.push({ id: ++msgId, role: 'user', content: inputText.value });
      ws.send(JSON.stringify({ type: 'chat', message: inputText.value }));
      inputText.value = '';
      scrollToBottom();
    }

    function scrollToBottom() {
      nextTick(() => {
        if (messagesEl.value) messagesEl.value.scrollTop = messagesEl.value.scrollHeight;
      });
    }

    function newSession() {
      const id = 'sess_' + Date.now();
      sessions.value.push({ id, name: '新会话' });
      currentSessionId.value = id;
      messages.value = [];
    }

    function switchSession(id) {
      currentSessionId.value = id;
      messages.value = [];
      if (ws && connected.value) {
        ws.send(JSON.stringify({ type: 'init', session_id: id }));
      }
    }

    onMounted(connect);

    return { sessions, currentSessionId, messages, inputText, connected, messagesEl, sendMessage, newSession, switchSession };
  }
});
app.use(ElementPlus);
for (const [key, comp] of Object.entries(ElementPlusIconsVue)) { app.component(key, comp); }
app.mount('#app');
</script>
</body>
</html>
