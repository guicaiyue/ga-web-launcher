version: '3.8'
services:
  backend:
    build: ./backend
    network_mode: bridge
    ports:
      - "8760:8000"
    volumes:
      - ./backend:/app
      - ./frontend:/frontend:ro
    environment:
      - PYTHONUNBUFFERED=1
  frontend:
    build: ./frontend
    network_mode: bridge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8761:80"
    depends_on:
      - backend
