name: Build and Push Docker Images

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: xirizhi
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./ga_web_launcher/backend
          push: true
          tags: docker.io/xirizhi/ga-web-launcher-backend:latest,docker.io/xirizhi/ga-web-launcher-backend:${{ github.sha }}

  build-frontend:
    needs: build-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: xirizhi
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./ga_web_launcher/frontend
          push: true
          tags: docker.io/xirizhi/ga-web-launcher-frontend:latest,docker.io/xirizhi/ga-web-launcher-frontend:${{ github.sha }}
