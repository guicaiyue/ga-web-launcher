name: Build and Push Docker Images

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./ga_web_launcher/backend
          push: true
          tags: |
            docker.io/guicaiyue/ga-web-launcher-backend:latest
            docker.io/guicaiyue/ga-web-launcher-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./ga_web_launcher/frontend
          push: true
          tags: |
            docker.io/guicaiyue/ga-web-launcher-frontend:latest
            docker.io/guicaiyue/ga-web-launcher-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
